    - momentum_reversal_risk
    - fundamental_fragility
    - report_leverage_pressure
    - report_cashflow_pressure
    - report_staleness_weight
    - report_integrated_stress
    - fundamental_report_gap
model:
  candidates: [rf, extra, gb]
  n_estimators: 500
  min_samples_leaf: 4
  class_weight: balanced_subsample
  n_jobs: -1
  regime_k: 2
  autoencoder_latent_dim: 3
  autoencoder_hidden_dim: 8
  autoencoder_epochs: 80
  ensemble_weight_step: 0.10
  calibration_grid: [0.65, 0.80, 1.00, 1.25, 1.50, 1.80]
  high_recall_bonus: 0.02
  overlay_min_sector_rows: 18
  overlay_min_gain: 0.10

walk_forward:
  initial_months: 12
  validation_months: 3
  test_months: 3
  step_months: 3

diagnostics:
  psi_bins: 10
  drift_psi_warn: 0.20
  run_data_quality_checks: true
  save_model_package: true
